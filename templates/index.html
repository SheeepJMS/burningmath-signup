<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学课程咨询</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/static/falcon-icon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Subtle background: medals image (softer so header stays readable) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("/hero-medals.jpg");
            background-size: cover;
            background-position: center;
            filter: blur(8px);
            opacity: 0.18;
            z-index: -2;
        }
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.2);
            z-index: -1;
        }
        body {
            background-color: #e8eaed;
            padding-bottom: 2rem;
            position: relative;
        }
        /* Content above background layers; form card unchanged */
        .page-wrap {
            position: relative;
            z-index: 0;
            max-width: 800px;
            margin: 0 auto;
            padding: 1rem 1rem 1.5rem;
        }
        @media (min-width: 576px) {
            .page-wrap { padding: 1.5rem 1.5rem 2rem; }
        }
        .form-container {
            width: 100%;
            padding: 1.25rem 1rem;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            border: 1px solid rgba(0,0,0,0.06);
        }
        @media (min-width: 576px) {
            .form-container { padding: 1.5rem 1.75rem; }
        }
        /* Official website entry: compact, premium */
        .website-entry {
            text-align: center;
            padding: 0.6rem 1rem;
            margin-bottom: 0.9rem;
            background: #fff;
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 10px;
            box-shadow: 0 1px 8px rgba(0,0,0,0.04);
        }
        .website-entry .lead { font-size: 0.95rem; color: #333; margin-bottom: 0.25rem; }
        .website-entry .btn-outline-primary {
            font-size: 0.9rem;
            padding: 0.4rem 1rem;
            border-radius: 8px;
        }
        /* Form sections grouping */
        .form-section {
            margin-bottom: 0.9rem;
        }
        .form-section-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #495057;
            margin-bottom: 0.45rem;
            letter-spacing: 0.02em;
        }
        .form-label { font-size: 0.9rem; margin-bottom: 0.25rem; }
        .form-container .mb-3 { margin-bottom: 0.65rem !important; }
        .form-control, .form-select { font-size: 0.95rem; }
        .form-check { margin-bottom: 0.3rem; }
        .form-check-label { font-size: 0.9rem; }
        .class-recommendation {
            display: none;
            margin-top: 1.5rem;
            padding: 1rem;
            border: 1px solid #dee2e6;
            border-radius: 8px;
        }
        /* Header panel: light glass panel for step + title + subtitle readability */
        .header-panel {
            background: rgba(255,255,255,0.72);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 16px;
            padding: 1rem 1.25rem;
            margin-bottom: 1rem;
            max-width: 100%;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
        }
        @media (min-width: 576px) {
            .header-panel { padding: 1.25rem 1.5rem; }
        }
        .header-panel .step-indicator {
            margin-bottom: 0.85rem;
        }
        .header-panel .page-title {
            color: #1a1d21;
            font-weight: 700;
            margin-bottom: 0.4rem;
        }
        .header-panel .helper-text {
            color: #4a4f56;
            margin-bottom: 0;
        }
        .step-indicator {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.25rem;
        }
        .step {
            font-weight: 600;
            font-size: 0.95rem;
            color: #5c6268;
            padding: 0 6px;
        }
        .step.active { color: #0d6efd; font-weight: 700; }
        .step-arrow { margin: 0 4px; font-size: 1rem; color: #5c6268; }
        .btn-submit {
            width: 100%;
            font-size: 1rem;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
        }
        .helper-text {
            font-size: 0.875rem;
            line-height: 1.4;
        }
        .page-title { font-size: 1.35rem; }
        @media (min-width: 576px) {
            .page-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="page-wrap">
        <div class="header-panel text-center">
            <div id="stepIndicator" class="step-indicator">
                <span id="step1" class="step active">1. 填写信息</span>
                <span class="step-arrow">→</span>
                <span id="step2" class="step">2. 查看推荐班级</span>
            </div>
            <h1 class="page-title">Book a Trial / Diagnostic</h1>
            <p class="helper-text">填写以下信息，我们会根据孩子情况推荐课程或诊断方向。<br><small>Fill out the form and we'll recommend a suitable class.</small></p>
        </div>
        <div id="step1Content">
            <!-- Official website entry: display-only, not a form field -->
            <div class="website-entry">
                <p class="lead mb-0">先了解课程与学生成绩</p>
                <p class="mb-0 small text-muted">Burning Math Academy 官网</p>
                <a href="https://www.burningmath.com" target="_blank" rel="noopener noreferrer" class="btn btn-outline-primary mt-2">查看官网 →</a>
            </div>

            <div class="form-container">
                <form id="customerForm">
                    <div class="form-section">
                        <div class="form-section-title">基本信息</div>
                        <div class="mb-3">
                            <label for="child_name" class="form-label">孩子姓名</label>
                            <input type="text" class="form-control" id="child_name" name="child_name" required>
                        </div>
                        <div class="mb-3">
                            <label for="wechat_name" class="form-label">家长微信名（用于联系）</label>
                            <input type="text" class="form-control" id="wechat_name" name="wechat_name" required>
                            <p class="form-text text-muted mt-1 mb-0 small">请填写家长本人微信，否则可能无法联系。</p>
                        </div>
                        <div class="mb-3">
                            <label for="grade" class="form-label">年级</label>
                            <select class="form-select" id="grade" name="grade" required>
                                <option value="">请选择年级</option>
                                <option value="G1">G1 (小学一年级)</option>
                                <option value="G2">G2 (小学二年级)</option>
                                <option value="G3">G3 (小学三年级)</option>
                                <option value="G4">G4 (小学四年级)</option>
                                <option value="G5">G5 (小学五年级)</option>
                                <option value="G6">G6 (小学六年级)</option>
                                <option value="G7">G7 (初中一年级)</option>
                                <option value="G8">G8 (初中二年级)</option>
                                <option value="G9">G9 (初中三年级)</option>
                                <option value="G10">G10 (高中一年级)</option>
                                <option value="G11">G11 (高中二年级)</option>
                                <option value="G12">G12 (高中三年级)</option>
                            </select>
                        </div>
                        <!-- Backend: field name competition_experience kept for DB compatibility; UI now collects 孩子学校 (school) -->
                        <div class="mb-3">
                            <label for="competition_experience" class="form-label">孩子学校</label>
                            <input type="text" class="form-control" id="competition_experience" name="competition_experience" placeholder="例如：St George / Crofton House / UHill / Lord Byng">
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="form-section-title">课程形式</div>
                        <div id="preferred_time_group">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="preferred_time" value="周末班课" id="pt1">
                                <label class="form-check-label" for="pt1">周末班课</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="preferred_time" value="周中 1v1 网课" id="pt2">
                                <label class="form-check-label" for="pt2">周中 1v1 网课</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="form-section-title">补充信息</div>
                        <div class="mb-3">
                            <label for="needs" class="form-label">补充信息（学习需求 / 目标竞赛 / 过往竞赛经历 / 排课需求）</label>
                            <textarea class="form-control" id="needs" name="needs" rows="4" style="min-height: 100px;" placeholder="例如：准备 AMC8 / 上过竞赛课 / 希望周末班课" required></textarea>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-submit">提交信息</button>
                </form>
            </div>
        </div>
        <div id="step2Content" style="display:none;">
            <div class="form-container">
                <div id="classRecommendation" class="class-recommendation" style="display:block;">
                    <h3>初步推荐班级</h3>
                    <div id="recommendedClassInfo"></div>
                    <div class="mt-4 text-center">
                        <div class="alert alert-success">
                            <h5>提交成功！</h5>
                            <p>感谢您的咨询，我们会尽快与您联系安排试课。</p>
                        </div>
                        <button class="btn btn-primary btn-submit" onclick="window.location.reload()">重新填写</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('customerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            if (submitBtn.disabled) return; // 防止极端情况下多次触发
            submitBtn.disabled = true; // 禁用按钮，防止重复提交
            const form = e.target;
            const formData = new FormData(form);
            // 处理preferred_time多选
            const checked = Array.from(document.querySelectorAll('input[name="preferred_time"]:checked')).map(cb => cb.value);
            formData.delete('preferred_time');
            formData.append('preferred_time', checked.join(','));
            try {
                const response = await fetch('/submit', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (data.success) {
                    // 切换到第二步
                    document.getElementById('step1Content').style.display = 'none';
                    document.getElementById('step2Content').style.display = 'block';
                    document.getElementById('step1').classList.remove('active');
                    document.getElementById('step2').classList.add('active');
                    // 推荐班级内容填充
                    let html = '';
                    if (data.recommended_classes.length === 0) {
                        html = '<div class="alert alert-warning">暂无适合的班级推荐。</div>';
                    } else {
                        data.recommended_classes.forEach(cls => {
                            html += `
                                <div class="alert alert-success mb-3">
                                    <h4>${cls.name}</h4>
                                    <p>${cls.description || ''}</p>
                                    ${cls.image_url ? `<img src="${cls.image_url}" alt="班级图片" style="width:100%;max-width:100%;border-radius:8px;margin-bottom:10px;">` : ''}
                                </div>
                            `;
                        });
                    }
                    document.getElementById('recommendedClassInfo').innerHTML = html;
                } else {
                    alert('提交失败：' + data.message);
                }
            } catch (error) {
                alert('提交失败，请稍后重试');
            } finally {
                submitBtn.disabled = false; // 恢复按钮
            }
        });
    </script>
</body>
</html>
